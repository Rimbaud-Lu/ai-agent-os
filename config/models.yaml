providers:

  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1

  anthropic:
    api_key: ${CLAUDE_API_KEY}

  deepseek:
    api_key: ${DEEPSEEK_API_KEY}

models:

  planning:
    provider: anthropic
    model: claude-3-5-sonnet

  coding:
    provider: openai
    model: gpt-4o-mini

  review:
    provider: deepseek
    model: deepseek-coder
